page: dashboard
route: /
description: TailAdmin ecommerce dashboard (Home page)
categories:
  card:
    required: true
    hosts:
      - metric.customers.card
      - metric.orders.card
      - target.monthly.card
      - demo.card
      - chart.sales
      - chart.monthly.card
      - orders.card
  button:
    required: true
    hosts:
      - orders.filter
      - orders.seeAll
  heading:
    required: true
    hosts:
      - dashboard.title
      - demo.title
      - target.monthly.title
      - chart.sales.title
      - chart.monthly.title
      - orders.title
  text:
    required: false
    hosts:
      - demo.subtitle
      - target.monthly.subtitle
      - chart.sales.subtitle
      - metric.customers.label
      - metric.customers.value
      - metric.orders.label
      - metric.orders.value
  table:
    required: true
    hosts:
      - orders.table
  nav:
    required: false
    hosts:
      - nav.dashboard
